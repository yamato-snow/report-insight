# Alembic 設定（DB設計書 §3: リビジョンは PR 単位1本、CIで upgrade→downgrade→upgrade 検証）
[alembic]
script_location = app/infra/db/migrations
prepend_sys_path = .
path_separator = os
version_path_separator = os
# sqlalchemy.url は env.py が Settings(DATABASE_URL) から注入する

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
